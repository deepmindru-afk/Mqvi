name: Build & Release Desktop

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: windows-x64
          - platform: macos-14
            label: macos-arm64
          - platform: ubuntu-22.04
            label: linux-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # node-gyp requires distutils (removed in Python 3.12+)
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Linux: X11 dev headers for uiohook-napi native build
      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-22.04'
        run: sudo apt-get update && sudo apt-get install -y libxtst-dev libx11-dev libxrandr-dev libxinerama-dev

      # ─── macOS: generate .icns from PNG ───
      - name: Generate macOS icon
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p icons/icon.iconset
          sips -z 16 16     icons/mqvi-icon-512x512.png --out icons/icon.iconset/icon_16x16.png
          sips -z 32 32     icons/mqvi-icon-512x512.png --out icons/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     icons/mqvi-icon-512x512.png --out icons/icon.iconset/icon_32x32.png
          sips -z 64 64     icons/mqvi-icon-512x512.png --out icons/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   icons/mqvi-icon-512x512.png --out icons/icon.iconset/icon_128x128.png
          sips -z 256 256   icons/mqvi-icon-512x512.png --out icons/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   icons/mqvi-icon-512x512.png --out icons/icon.iconset/icon_256x256.png
          sips -z 512 512   icons/mqvi-icon-512x512.png --out icons/icon.iconset/icon_256x256@2x.png
          sips -z 512 512   icons/mqvi-icon-512x512.png --out icons/icon.iconset/icon_512x512.png
          iconutil -c icns icons/icon.iconset -o icons/icon.icns
          rm -rf icons/icon.iconset

      # ─── macOS: import code signing certificate ───
      - name: Import Apple certificate
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm certificate.p12

      # ─── macOS: write API key for notarization ───
      - name: Prepare Apple API key
        if: startsWith(matrix.platform, 'macos')
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/apple-keys"
          echo "$APPLE_API_KEY" | base64 --decode > "$RUNNER_TEMP/apple-keys/AuthKey.p8"

      # ─── Windows: setup MSVC for native audio-capture.exe ───
      - name: Setup MSVC
        if: matrix.platform == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      # ─── Install dependencies ───
      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci --prefix client

      # ─── Build client (Vite) ───
      - name: Build client
        run: npx vite build --outDir dist
        working-directory: client

      # ─── Windows: compile native audio-capture.exe ───
      - name: Compile audio-capture.exe
        if: matrix.platform == 'windows-latest'
        run: cl.exe /EHsc /O2 /W3 native\audio-capture.cpp /Fe:native\audio-capture.exe ole32.lib mmdevapi.lib
        shell: cmd

      # ─── Compile Electron TypeScript ───
      - name: Compile Electron TypeScript
        run: npx tsc -p electron/tsconfig.json

      # ─── Platform-specific builds ───

      # Windows: 3-phase build (unpacked → rcedit icon → NSIS installer)
      - name: Build Windows (unpacked)
        if: matrix.platform == 'windows-latest'
        run: npx electron-builder --win --dir

      - name: Embed Windows icon
        if: matrix.platform == 'windows-latest'
        run: node_modules\rcedit\bin\rcedit-x64.exe release\win-unpacked\mqvi.exe --set-icon icons\mqvi-icon.ico
        shell: cmd

      - name: Generate app-update.yml
        if: matrix.platform == 'windows-latest'
        run: |
          @"
          provider: github
          owner: akinalpfdn
          repo: Mqvi
          updaterCacheDirName: mqvi-desktop-updater
          "@ | Set-Content -Path "release/win-unpacked/resources/app-update.yml" -Encoding UTF8
        shell: pwsh

      - name: Build Windows NSIS
        if: matrix.platform == 'windows-latest'
        run: npx electron-builder --win nsis --prepackaged release/win-unpacked --publish never

      # macOS: DMG with code signing + notarization
      # electron-builder reads CSC_LINK/CSC_KEY_PASSWORD for signing.
      # @electron/notarize reads APPLE_API_KEY_ID, APPLE_API_ISSUER, APPLE_API_KEY_PATH, APPLE_TEAM_ID.
      - name: Build macOS DMG
        if: startsWith(matrix.platform, 'macos')
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ format('{0}/apple-keys/AuthKey.p8', runner.temp) }}
        run: npx electron-builder --mac --arm64 --publish never

      # Linux: AppImage
      - name: Build Linux AppImage
        if: matrix.platform == 'ubuntu-22.04'
        run: npx electron-builder --linux --publish never

      # ─── Upload artifacts ───
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.label }}
          path: |
            release/mqvi-setup.*
            release/latest*.yml

  # ─── Server binary build (Linux amd64 + arm64) ───
  build-server:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: server/go.sum

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Build client (Vite) for embedding
        run: npx vite build --outDir dist
        working-directory: client

      - name: Embed frontend into server/static/dist
        run: |
          rm -rf server/static/dist
          cp -r client/dist server/static/dist

      - name: Build mqvi-server (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o ../release-server/mqvi-server-linux-amd64 .
        working-directory: server

      - name: Build mqvi-server (linux/arm64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o ../release-server/mqvi-server-linux-arm64 .
        working-directory: server

      - name: Copy install script
        run: cp deploy/install.sh release-server/install.sh

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-server-linux
          path: release-server/*

  # ─── Create release and upload all artifacts ───
  release:
    needs: [build, build-server]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ github.ref_name }}
          NOTES_FILE="release-notes/${TAG}.md"

          if [ ! -s "$NOTES_FILE" ]; then
            echo "ERROR: Missing or empty release notes file: $NOTES_FILE"
            exit 1
          fi

          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file "$NOTES_FILE" \
            artifacts/* \
            || echo "Release may already exist, uploading assets..."

          gh release upload "$TAG" artifacts/* --clobber 2>/dev/null || true
